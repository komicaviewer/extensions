name: Distribution admission

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: distribution-admission-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination policy from base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false

      - name: Checkout untrusted candidate tree
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install Android verification tools
        shell: bash
        run: |
          set -euo pipefail
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "build-tools;34.0.0" >/dev/null 2>&1 || true
          echo "AAPT=$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt" >> "$GITHUB_ENV"
          echo "APKSIGNER=$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" >> "$GITHUB_ENV"

      - name: Test destination-owned admission policy
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python3 -m unittest discover -s base/policy -p 'test_*.py'

      - name: Validate candidate distribution
        shell: bash
        run: bash base/policy/run-admission.sh candidate base
